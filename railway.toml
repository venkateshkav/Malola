[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python manage.py migrate --run-syncdb && python manage.py collectstatic --noinput && gunicorn malola_site.wsgi --bind 0.0.0.0:$PORT --workers ${WEB_CONCURRENCY:-3} --threads 4 --timeout 60 --log-file -"
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
