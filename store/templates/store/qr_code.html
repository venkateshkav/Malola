<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malola – QR Code</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',sans-serif;background:#f4faf8;min-height:100vh;display:flex;align-items:center;justify-content:center}
  .wrap{background:#fff;border-radius:24px;box-shadow:0 8px 40px rgba(14,138,112,.13);padding:40px 48px;text-align:center;max-width:400px;width:100%}
  .brand{font-size:26px;font-weight:900;color:#1a2e4a;margin-bottom:4px}
  .brand span{color:#1aaa8c}
  .subtitle{font-size:13px;color:#6b7280;margin-bottom:28px}
  #qr-box{display:flex;justify-content:center;margin-bottom:24px}
  #qr-box img,#qr-box canvas{border-radius:12px;box-shadow:0 4px 20px rgba(14,138,112,.15)}
  .url-pill{display:inline-block;background:#e6f7f2;color:#0e7a60;font-size:12px;font-weight:700;padding:7px 18px;border-radius:999px;margin-bottom:20px;word-break:break-all}
  .hint{font-size:12px;color:#9ca3af;margin-bottom:24px}
  .print-btn{display:inline-block;background:#1aaa8c;color:#fff;font-size:14px;font-weight:800;padding:12px 32px;border-radius:999px;border:none;cursor:pointer;transition:opacity .2s}
  .print-btn:hover{opacity:.85}

  @media print{
    body{background:#fff}
    .print-btn,.hint{display:none}
    .wrap{box-shadow:none;padding:20px}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">malo<span>la</span> 🌿</div>
  <div class="subtitle">Manufacturer Details QR Code</div>

  <div id="qr-box"></div>

  <div class="url-pill" id="qr-url"></div>
  <div class="hint">Scan to view manufacturer &amp; FSSAI details</div>

  <button class="print-btn" onclick="window.print()">🖨️ Print QR Code</button>
</div>

<script>
  const url = window.location.origin + '/manufacturingdetails/';
  document.getElementById('qr-url').textContent = url;

  new QRCode(document.getElementById('qr-box'), {
    text: url,
    width: 240,
    height: 240,
    colorDark: '#1a2e4a',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.H
  });
</script>
</body>
</html>
